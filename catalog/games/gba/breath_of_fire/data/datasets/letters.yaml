  - value: 0x3E
    character: "U"

  - value: 0x3F
    character: "V"

  - value: 0x40
    character: "W"

  - value: 0x41
    character: "X"

  - value: 0x42
    character: "Y"

  - value: 0x43
    character: "Z"

  # Special Characters #
  - value: 0x45
