kind: dataset

id: character_set

schema:
key: value

fields:
  - name: value
    type: uint8

  - name: character
    type: string

entries:
  # End character #
  - value: 0x00
    character: ""

  # Numbers #
  - value: 0x20
    character: "0"

  - value: 0x21
    character: "1"

  - value: 0x22
    character: "2"

  - value: 0x23
    character: "3"

  - value: 0x24
    character: "4"

  - value: 0x25
    character: "5"

  - value: 0x26
    character: "6"

  - value: 0x27
    character: "7"

  - value: 0x28
    character: "8"

  - value: 0x29
    character: "9"

  # Uppercase Characters #
  - value: 0x2A
    character: "A"

  - value: 0x2B
    character: "B"

  - value: 0x2C
    character: "C"

  - value: 0x2D
    character: "D"

  - value: 0x2E
    character: "E"

  - value: 0x2F
    character: "F"

  - value: 0x30
